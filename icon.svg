<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a2a6b"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>
  </defs>

  <!-- Full background fills the maskable canvas -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Dumbbell (Kraft element) — horizontal, centered in the canvas (vertical + horizontal center = 512) -->
  <g fill="#ffffff">
    <!-- bar -->
    <rect x="320" y="481" width="384" height="62" rx="14"/>
    <!-- bar inner highlight for subtle depth -->
    <rect x="332" y="491" width="360" height="6" rx="3" fill="#ffffff" opacity="0.55"/>

    <!-- left inner plate -->
    <rect x="240" y="411" width="84" height="202" rx="22"/>
    <!-- left outer plate (smaller, further out) -->
    <rect x="178" y="391" width="60" height="242" rx="22"/>

    <!-- right inner plate -->
    <rect x="700" y="411" width="84" height="202" rx="22"/>
    <!-- right outer plate -->
    <rect x="786" y="391" width="60" height="242" rx="22"/>
  </g>
</svg>
