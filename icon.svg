<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a2a6b"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>
    <!-- subtle glow under the pace curve so it reads on the gradient -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Full background fills the maskable canvas -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Pace curve (Cardio element) — sits above the dumbbell, rising left→right -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- soft glow copy underneath -->
    <path d="M 200 430 Q 360 290 520 360 T 820 250"
          stroke-width="36" opacity="0.18" filter="url(#softGlow)"/>
    <!-- main curve -->
    <path d="M 200 430 Q 360 290 520 360 T 820 250"
          stroke-width="30" opacity="0.96"/>
    <!-- end marker -->
    <circle cx="820" cy="250" r="24" fill="#ffffff" stroke="none"/>
    <!-- start marker (small) -->
    <circle cx="200" cy="430" r="10" fill="#ffffff" stroke="none" opacity="0.85"/>
  </g>

  <!-- Dumbbell (Kraft element) — centered, horizontal, slightly below center -->
  <g fill="#ffffff">
    <!-- bar -->
    <rect x="320" y="582" width="384" height="62" rx="14"/>
    <!-- bar inner highlight for subtle depth -->
    <rect x="332" y="592" width="360" height="6" rx="3" fill="#ffffff" opacity="0.55"/>

    <!-- left inner plate -->
    <rect x="240" y="512" width="84" height="202" rx="22"/>
    <!-- left outer plate (smaller, further out) -->
    <rect x="178" y="492" width="60" height="242" rx="22"/>

    <!-- right inner plate -->
    <rect x="700" y="512" width="84" height="202" rx="22"/>
    <!-- right outer plate -->
    <rect x="786" y="492" width="60" height="242" rx="22"/>
  </g>
</svg>
